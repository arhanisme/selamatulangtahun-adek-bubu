<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Lavenia 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff7fb;
  overflow-x: hidden;
  color: #333;
}

.page {
  display: none;
  min-height: 100vh;
  padding: 20px;
  text-align: center;
}

.active {
  display: block;
}

/* Cute BubuDudu vibe */
.title {
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
}

.sub {
  font-size: 16px;
  margin: 10px 0 20px;
}

.btn {
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: #ff7aa2;
  color: white;
  font-size: 16px;
  margin-top: 20px;
}

.btn:active {
  transform: scale(0.95);
}

.card {
  background: white;
  padding: 15px;
  border-radius: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  margin: 10px auto;
  max-width: 320px;
}

.photo-slot {
  width: 200px;
  height: 200px;
  border-radius: 20px;
  border: 2px dashed #ff7aa2;
  margin: 10px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #aaa;
}

img {
  max-width: 100%;
  border-radius: 15px;
}

/* timeline */
.timeline img {
  width: 100%;
  border-radius: 15px;
  margin: 10px 0;
}

/* heart image */
.heart-frame {
  width: 250px;
  height: 250px;
  margin: 20px auto;
  clip-path: path("M150 30 C150 -20 220 -20 220 50 C220 120 150 160 150 160 C150 160 80 120 80 50 C80 -20 150 -20 150 30Z");
  background: #fff;
  overflow: hidden;
  border: 3px solid #ff7aa2;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<canvas id="confetti"></canvas>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <div class="title">Happy Birthday My Bubu 🐻💖</div>
  <div class="sub">For Lavenia ✨</div>

  <div class="card">
    <img src="cake.png" alt="cake"/>
    <div class="photo-slot">
      Your Photo Here
    </div>
  </div>

  <button class="btn" onclick="goPage2()">A Gift for You 🎁</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <div class="title">Happy Birthday Lavenia 🎉</div>

  <div class="sub">
    Semoga hari ini penuh cinta, tawa, dan kebahagiaan seperti Bubu & Dudu 🐼🐻
  </div>

  <div class="timeline">
    <img src="1.jpg">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
    <img src="5.jpg">
    <img src="6.jpg">
    <img src="7.jpg">
  </div>

  <button class="btn" onclick="goPage3()">Until we meet 💞</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <div class="title">Forever You 💖</div>

  <div class="heart-frame">
    <img src="love.jpg" style="width:100%; height:100%; object-fit:cover;">
  </div>

  <button class="btn" onclick="goPage1()">
    Another year of making memories together ✨
  </button>
</div>

<script>
// PAGE NAVIGATION
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goPage2(){
  startMusic();
  showPage('page2');
  startConfetti();
}

function goPage3(){
  showPage('page3');
}

function goPage1(){
  showPage('page1');
}

// MUSIC
const bgm = document.getElementById("bgm");
function startMusic(){
  bgm.play().catch(()=>{});
}

// CONFETTI SIMPLE
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

function startConfetti(){
  pieces = [];
  for(let i=0;i<120;i++){
    pieces.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height - canvas.height,
      r: Math.random()*6+4,
      d: Math.random()*120,
      color: `hsl(${Math.random()*360},70%,60%)`
    });
  }
  animate();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces.forEach(p=>{
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  });
  update();
}

function update(){
  pieces.forEach(p=>{
    p.y += Math.cos(p.d)+2;
    p.x += Math.sin(p.d/10);
    if(p.y > canvas.height){
      p.y = -10;
      p.x = Math.random()*canvas.width;
    }
  });
}

function animate(){
  draw();
  requestAnimationFrame(animate);
}
</script>

</body>
</html>
